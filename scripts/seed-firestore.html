function updateTenantLabel() {
  const tenant = getTenant();

// Auth
async function doLogin() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  try {
    await authInstance.signInWithEmailAndPassword(email, pass);
    document.getElementById('authStatus').textContent = '✅ Signed in as ' + email;
    document.getElementById('authStatus').style.color = '#0f0';
    log('🔐 Signed in as ' + email);
  } catch(e) {
    log('❌ Auth error: ' + e.message);
  }
}
authInstance.onAuthStateChanged(u => {
  if (u) {
    document.getElementById('authStatus').textContent = '✅ Signed in: ' + u.email;
    document.getElementById('authStatus').style.color = '#0f0';
  }
});

async function ensureCurrentUserProfile() {
  const u = authInstance.currentUser;
  if (!u) {
    throw new Error('Bạn chưa đăng nhập Firebase Auth');
  }
  const tenant = getTenant();
  const userRef = db.collection('users').doc(u.uid);
  await userRef.set({
    email: u.email || '',
    full_name: u.email || 'Admin User',
    role: 'admin',
    tenant_id: tenant,
    status: 'active',
    created_at: now,
    updated_at: now,
    updated_by: 'seed-script'
  }, { merge: true });
  log(`✅ users: ensured profile for ${u.email} (uid=${u.uid}, role=admin, tenant=${tenant})`);
}

// ========== SEED FUNCTION ==========
async function seedCollection(name, items) {
  const tenant = getTenant();
  const batch = db.batch();
  items.forEach(item => {
    const {id, ...data} = item;
    data.tenant_id = tenant;
    data.created_at = data.created_at || now;
    data.updated_at = data.updated_at || now;
    data.updated_by = 'seed-script';
    if (typeof data.is_deleted === 'undefined') data.is_deleted = 0;

    // Compatibility aliases for pages using mixed field names
    if (name === 'customers') {
      if (!data.name && data.customer_name) data.name = data.customer_name;
    }
    if (name === 'routes') {
      if (!data.name && data.route_name) data.name = data.route_name;
    }
    if (name === 'trips') {
      if (typeof data.freight_revenue === 'undefined') data.freight_revenue = data.total_revenue || 0;
      if (typeof data.additional_charges === 'undefined') data.additional_charges = 0;
      if (typeof data.total_expenses === 'undefined') data.total_expenses = 0;
    }
    if (!data.record_id) data.record_id = tenant + '_' + name + '_' + id;
    batch.set(db.collection(name).doc(id), data);
  });
  await batch.commit();
  log(`✅ ${name}: ${items.length} documents seeded`);
}

async function safeSeedCollection(name, items) {
  try {
    await seedCollection(name, items);
    return true;
  } catch (e) {
    log(`⚠️ ${name}: failed - ${e.message}`);
    return false;
  }
}

async function runSeed() {
  const tenant = getTenant();
  log(`🚀 Starting seed for tenant: ${tenant} ...\n`);
  try {
    await ensureCurrentUserProfile();
    const results = [];
    results.push(await safeSeedCollection('vehicles', VEHICLES));
    results.push(await safeSeedCollection('drivers', DRIVERS));
    results.push(await safeSeedCollection('customers', CUSTOMERS));
    results.push(await safeSeedCollection('routes', ROUTES));
    results.push(await safeSeedCollection('trips', TRIPS));
    results.push(await safeSeedCollection('expenses', EXPENSES));
    results.push(await safeSeedCollection('maintenance', MAINTENANCE));
    results.push(await safeSeedCollection('expenseCategories', EXPENSE_CATEGORIES));
    results.push(await safeSeedCollection('accountingPeriods', ACCOUNTING_PERIODS));
    results.push(await safeSeedCollection('companySettings', COMPANY_SETTINGS));
    results.push(await safeSeedCollection('transportOrders', TRANSPORT_ORDERS));
    results.push(await safeSeedCollection('tires', TIRES));
    results.push(await safeSeedCollection('inventory', INVENTORY));
    results.push(await safeSeedCollection('purchaseOrders', PURCHASE_ORDERS));
    results.push(await safeSeedCollection('inventoryTransactions', INVENTORY_TRANSACTIONS));
    results.push(await safeSeedCollection('tripExpenses', TRIP_EXPENSES));
    results.push(await safeSeedCollection('alerts', ALERTS));
    results.push(await safeSeedCollection('partners', PARTNERS));
    results.push(await safeSeedCollection('users', USERS));
    const ok = results.filter(Boolean).length;
    log(`\n🎉 SEED DONE! success collections: ${ok}/${results.length}`);
    log('Scenario coverage: draft/pending/confirmed/dispatched/in_progress/completed/closed/cancelled + inventory + users roles + alerts');
    log('👉 Reload FleetPro app (localhost:5173) to see data');
  } catch(e) {
    log('❌ ERROR: ' + e.message);
    console.error(e);
  }
}

async function clearAll() {
  const tenant = getTenant();
  if (!confirm(`⚠️ Xóa TOÀN BỘ data tenant ${tenant}?`)) return;
  log('🗑️ Clearing...');
  const collections = ['vehicles','drivers','customers','routes','trips','expenses','maintenance','expenseCategories','accountingPeriods','companySettings','transportOrders','tires','inventory','purchaseOrders','inventoryTransactions','tripExpenses','alerts','partners','users'];
  for (const col of collections) {
    const snap = await db.collection(col).where('tenant_id','==',tenant).get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    log(`🗑️ ${col}: ${snap.size} deleted`);
  }
  log('\n✅ All cleared');
}
